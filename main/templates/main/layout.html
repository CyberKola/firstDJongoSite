{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Team Fortress 2{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'main/css/main.css' %}?v=2">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
</head>
<body class="tf2">
    <header class="tf2-header">
        <div class="tf2-brand">
            <img src="{% static 'main/img/RED_logo.webp' %}" alt="TF2 Logo" class="tf2-logo">
            <div class="tf2-title">
                <h1>Team Fortress 2</h1>
                <p>Красная команда готова к бою!</p>
            </div>
        </div>

        <nav class="tf2-nav" aria-label="Главное меню">
            <ul>
                <li><a href="{% url 'home' %}"><i class="fa-solid fa-house"></i> Домой</a></li>
                <li><a href="{% url 'news_home' %}"><i class="fa-solid fa-newspaper"></i> Новости</a></li>
                <li><a href="{% url 'about' %}"><i class="fa-solid fa-book-open"></i> О проекте</a></li>
                <li><a href="{% url 'recipes' %}"><i class="fa-solid fa-utensils"></i> Рецепты</a></li>
                <li><a href="#"><i class="fa-solid fa-satellite-dish"></i> Контакты</a></li>
            </ul>
        </nav>
    </header>
    <main class="tf2-main">
        <div class="tf2-content">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="tf2-footer">
        <p>© 2026 — Team Fortress 2 Fan Site</p>
    </footer>
</body>
</html>
