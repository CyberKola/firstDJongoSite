<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Register</title>
</head>
<body>
  <h1>Register</h1>

  <form method="post">
    {% csrf_token %}

    {{ form.non_field_errors }}

    <div>
      <label for="id_username">Username</label>
      {{ form.username }}
    </div>

    <div>
      <label for="id_password1">Password</label>
      {{ form.password1 }}
    </div>

    <div>
      <label for="id_password2">Confirm password</label>
      {{ form.password2 }}
    </div>

    <button type="submit">Create account</button>
  </form>
</body>
</html>
